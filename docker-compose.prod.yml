version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_id_cards
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads
    expose:
      - "4000"
    networks:
      - school-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: always
    expose:
      - "80"
    networks:
      - school-network

volumes:
  postgres_data:
  uploads:

networks:
  school-network: